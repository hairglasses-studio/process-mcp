name: MCP Tool Request
description: Propose a new MCP tool for process-mcp
title: "[Tool] "
labels: ["type/mcp-tool", "status/triage"]
assignees: ["hairglasses"]
body:
  - type: markdown
    attributes:
      value: |
        Propose a new MCP tool! Describe what it should do, who benefits, and how agents would use it.

  - type: input
    id: tool-name
    attributes:
      label: Tool Name
      description: "Follow the naming convention (e.g., `ps_top`, `investigate_memory`)"
      placeholder: "ps_top"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What does this tool do? One clear sentence.
      placeholder: "Shows the top N processes by CPU or memory usage."
    validations:
      required: true

  - type: textarea
    id: parameters
    attributes:
      label: Input Parameters
      description: What input parameters should the tool accept? Use a table format.
      placeholder: |
        | Parameter | Type | Required | Description |
        |-----------|------|----------|-------------|
        | sort_by | string | no | Sort field: "cpu" or "memory" (default: cpu) |
        | limit | int | no | Number of processes to return (default: 10) |
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Expected Output
      description: What should the tool return? Provide an example.
      placeholder: |
        ```json
        {
          "processes": [
            {"pid": 1234, "name": "firefox", "cpu_percent": 12.5, "mem_mb": 890}
          ]
        }
        ```
    validations:
      required: true

  - type: textarea
    id: security
    attributes:
      label: Security Considerations
      description: Does this tool read sensitive data, modify system state, or require elevated privileges?
      placeholder: "Read-only, no sensitive data. Only reads /proc entries."

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I checked the existing tool catalog and this is not a duplicate
          required: true
        - label: I am willing to implement this tool
          required: false
